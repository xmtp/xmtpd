version: "2"
linters:
  default: none
  enable:
    # Tier 1: Bug detection (already enabled)
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - nilerr
    - nakedret
    - modernize
    # Tier 2: Autofix linters (new)
    - testifylint
    - perfsprint
    - intrange
    - copyloopvar
    - misspell
    - errorlint
    - protogetter
  exclusions:
    generated: lax
    rules:
      # Suppress deprecated-usage warnings for PayerApi/ReplicationApi types.
      # These will be removed in Phase 2 of d14n service restructuring.
      - linters: [staticcheck]
        text: "SA1019:"
        path: "(pkg/testutils/|pkg/utils/api_clients\\.go|pkg/sync/|pkg/gateway/|pkg/api/payer/|pkg/stress/|_test\\.go)"

formatters:
  enable:
    - gofmt
    - golines
    - gofumpt
  exclusions:
    paths:
      - pkg/stress/envelopes_payloads.go
    generated: lax
