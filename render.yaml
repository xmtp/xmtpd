services:
  - type: worker
    runtime: node
    name: xmtp-gateway
    numInstances: 1
    region: frankfurt
    plan: starter
    branch: main
    buildCommand: npm init -y && npm install @xmtp/gateway
    startCommand: node node_modules/@xmtp/gateway/dist/start.js
    envVars:
      - key: PAYER_PRIVATE_KEY
        sync: false
      - key: APP_CHAIN_RPC_URL
        sync: false
      - key: APP_CHAIN_WSS_URL
        sync: false
      - key: SETTLEMENT_CHAIN_RPC_URL
        sync: false
      - key: SETTLEMENT_CHAIN_WSS_URL
        sync: false
      - key: CONTRACTS_ENVIRONMENT
        value: 'testnet'
      - key: REDIS_URL
        fromService:
          name: xmtp-gateway-redis
          type: kvs
          property: connectionString
      - key: LOG_LEVEL
        value: 'info'

  - type: kvs
    name: xmtp-gateway-redis
    region: frankfurt
    plan: starter
    maxmemoryPolicy: noeviction
    ipAllowList: []
